name: "Lab 1"
on:
  push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: "Setup Node.js"
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci

      - name: "Lint"
        run: |
          echo "linting code..."
          npm run lint
          echo "linting code...done"